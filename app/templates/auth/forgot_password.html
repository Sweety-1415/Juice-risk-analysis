{% extends 'base.html' %}
{% block title %}Forgot Password | NutriLens{% endblock %}
{% block page_content %}
<section class="auth-card">
    <div class="hero-copy">
        <p class="eyebrow">Recovery</p>
        <h2>Reset password with your recovery keyword.</h2>
        <p class="muted">This works without email so the app stays self-contained inside your local project.</p>
    </div>
    <form method="post" class="form-card">
        <h3>Forgot Password</h3>
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Recovery Keyword
            <input type="text" name="recovery_answer" required>
        </label>
        <label>New Password
            <input type="password" name="new_password" required>
        </label>
        <label>Confirm Password
            <input type="password" name="confirm_password" required>
        </label>
        <button type="submit" class="btn-primary">Reset Password</button>
        <div class="auth-links">
            <a href="{{ url_for('login') }}">Back to login</a>
        </div>
    </form>
</section>
{% endblock %}
