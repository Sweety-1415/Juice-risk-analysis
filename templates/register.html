<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuiceScan AI — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="stars"></div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <i class="ph ph-user-plus"></i>
                <h1>Create <span>Account</span></h1>
            </div>
            <p class="auth-subtitle">Join JuiceScan AI — Your Smart Health Companion</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}" class="auth-form">
                <div class="input-group">
                    <i class="ph ph-identification-card"></i>
                    <input type="text" name="full_name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="ph ph-user"></i>
                    <input type="text" name="username" placeholder="Username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <i class="ph ph-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="ph ph-lock"></i>
                    <input type="password" name="password" placeholder="Password" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="ph ph-user-plus"></i> Register
                </button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('login') }}"><i class="ph ph-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
