<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuiceScan AI — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="stars"></div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <i class="ph ph-scan"></i>
                <h1>JuiceScan <span>AI</span></h1>
            </div>
            <p class="auth-subtitle">AI-Powered Beverage Health Risk Analyzer</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="input-group">
                    <i class="ph ph-user"></i>
                    <input type="text" name="username" placeholder="Username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <i class="ph ph-lock"></i>
                    <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="ph ph-sign-in"></i> Sign In
                </button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                <span class="divider">|</span>
                <a href="{{ url_for('register') }}">Create New Account</a>
            </div>
        </div>
    </div>
</body>
</html>
